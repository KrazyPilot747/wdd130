<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
       .container {
        width: 800px;
        height: 700px;
        background: url(images/christus.webp);
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        margin:auto;
        border: 10px;
        border-style: solid;
        border-color: black;
        border-radius: 50px;
        color: white;
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
       }
       .first-presidency img {
        width: 150px;
        height: auto;
       }
       .prophet {
        width: 175;
        height: auto;
       }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            First presidency

        </h1>

        <div class="first-presidency">
            <img src="images/eyring.webp" alt="Henry B. Eyring">
            <img src="images/oaks.webp" alt="Dallin H. Oaks" class="prophet">
            <img src="images/christofferson.webp" alt="D. Todd Christopherson">

        </div>
        

    </div>
</body>
</html>
